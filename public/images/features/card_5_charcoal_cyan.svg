<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 886" width="1920" height="886">
  <defs><clipPath id="r"><rect width="1920" height="886" rx="20"/></clipPath></defs>
  <g clip-path="url(#r)">
    <rect width="1920" height="886" fill="#aab6c2"/>

    <!-- background big light triangles top -->
    <polygon points="0,0 480,0 240,420" fill="#aab6c2"/>
    <polygon points="1300,0 1700,0 1500,360" fill="#bfeff5"/>
    <polygon points="1700,0 1920,0 1920,260" fill="#aab6c2"/>

    <!-- LEFT M leg -->
    <polygon points="-20,886 460,40 660,886" fill="#5a6e80"/>
    <polygon points="-20,886 460,40 230,886" fill="#0f172a"/>

    <!-- MIDDLE M peak (orange) -->
    <polygon points="430,886 960,30 1290,886" fill="#06b6d4"/>

    <!-- RIGHT M leg -->
    <polygon points="1060,886 1540,40 1940,886" fill="#5a6e80"/>
    <polygon points="1290,886 1540,40 1940,886" fill="#0f172a"/>
    <polygon points="1060,886 1540,40 1700,886" fill="#5a6e80"/>

    <!-- intersection darker triangle near middle-right -->
    <polygon points="1060,210 1290,210 1175,420" fill="#0f172a" opacity="0.9"/>
    <polygon points="1290,886 1290,210 1700,886" fill="#0f172a" opacity="0.55"/>

    <!-- DIAL / GAUGE on right -->
    <g>
      <circle cx="1660" cy="650" r="330" fill="none" stroke="#5a6e80" stroke-width="2" opacity="0.55"/>
      <circle cx="1660" cy="650" r="270" fill="none" stroke="#5a6e80" stroke-width="2" opacity="0.5"/>
      <rect x="1650" y="300" width="16" height="34" fill="#5a6e80" opacity="0.6"/>
      <rect x="1650" y="965" width="16" height="34" fill="#5a6e80" opacity="0.6"/>
      <rect x="1990" y="640" width="16" height="34" fill="#5a6e80" opacity="0.6" transform="rotate(90 1998 657)"/>
      <circle cx="1500" cy="700" r="170" fill="#06b6d4"/>
    </g>

    <!-- LEFT needle line -->
    <line x1="160" y1="760" x2="350" y2="300" stroke="#06b6d4" stroke-width="5"/>
    <circle cx="350" cy="300" r="15" fill="#06b6d4"/>
    <line x1="250" y1="886" x2="430" y2="500" stroke="#aab6c2" stroke-width="2" opacity="0.6"/>

    <!-- small accent square ticks -->
    <rect x="170" y="640" width="10" height="22" fill="#06b6d4" opacity="0.7" transform="rotate(48 175 651)"/>
    <rect x="280" y="470" width="10" height="22" fill="#06b6d4" opacity="0.7" transform="rotate(48 285 481)"/>
  </g>
</svg>